{% extends 'base.html' %}
{% block title %}Новый баг{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-4">🐞 Новый баг</h2>
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% for error in field.errors %}<div class="alert alert-danger">{{ error }}</div>{% endfor %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary">Отправить</button>
                    <a href="{% url 'core:home' %}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
