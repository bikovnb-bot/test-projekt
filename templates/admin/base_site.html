{% extends "admin/base_site.html" %}
{% load i18n static %}

{% block title %}{% trans "Администрирование системы эксплуатации" %}{% endblock %}

{% block extrastyle %}
<style>
    /* Кастомные стили поверх темы admin-interface */
    .dashboard-card-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin: 20px 0;
    }
    .card {
        background: #f8f9fa;
        border-radius: 12px;
        padding: 20px;
        width: 280px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        transition: 0.2s;
    }
    .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }
    .card h3 {
        margin-top: 0;
        color: #2c3e50;
    }
    .card .button {
        background: #3498db;
        padding: 6px 12px;
        border-radius: 20px;
        color: white;
        text-decoration: none;
        display: inline-block;
        margin-top: 10px;
    }
    .card .button:hover { background: #2980b9; }
</style>
{% endblock %}

{% block branding %}
<h1 id="site-name"><a href="{% url 'admin:index' %}">Система эксплуатации</a></h1>
{% endblock %}

{% block userlinks %}
{{ block.super }}
{% endblock %}
