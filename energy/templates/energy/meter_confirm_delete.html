{% extends 'base.html' %}
{% block title %}Удаление счётчика{% endblock %}

{% block content %}
<div class="card border-danger shadow-sm">
    <div class="card-header bg-danger text-white">
        <h4 class="mb-0">Подтверждение удаления</h4>
    </div>
    <div class="card-body">
        <p>Вы действительно хотите удалить счётчик <strong>{{ meter.serial_number }}</strong>?</p>
        <p class="text-danger">Это действие также удалит все связанные показания и документы!</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{% url 'energy:meter_detail' meter.pk %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
