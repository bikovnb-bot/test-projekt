{% extends 'base.html' %}
{% block title %}Экспорт истории показаний{% endblock %}
{% block content %}
<h2>📤 Экспорт истории показаний</h2>
<div class="card">
    <div class="card-body">
        <form method="get" class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Счётчик</label>
                <select name="meter" class="form-select" required>
                    <option value="">Выберите...</option>
                    {% for meter in meters %}
                        <option value="{{ meter.pk }}">{{ meter.serial_number }} ({{ meter.resource_type.name }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Начало периода</label>
                <input type="date" name="start_date" class="form-control">
            </div>
            <div class="col-md-3">
                <label class="form-label">Конец периода</label>
                <input type="date" name="end_date" class="form-control">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-primary">Скачать Excel</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
