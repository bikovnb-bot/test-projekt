{% extends 'base.html' %}
{% block title %}Загрузка документа{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>📄 Загрузка документа для счётчика "{{ meter.serial_number }}"</h2>
    <a href="{% url 'energy:meter_detail' meter.pk %}" class="btn btn-secondary">← Назад</a>
</div>
<div class="card">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Загрузить</button>
            <a href="{% url 'energy:meter_detail' meter.pk %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
