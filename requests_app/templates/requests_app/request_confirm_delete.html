{% extends "base.html" %}
{% load custom_filters %}

{% block title %}Удаление заявки{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-danger text-white">
            <h4 class="mb-0">Удаление заявки</h4>
        </div>
        <div class="card-body">
            <p>Вы уверены, что хотите удалить заявку <strong>{{ req.request_number|escape }}</strong>?</p>
            <p class="text-muted">{{ req.description|striptags|truncatewords:30 }}</p> <!-- XSS fix -->
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Удалить</button>
                <a href="{% url 'requests_app:request_list' %}" class="btn btn-outline-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
