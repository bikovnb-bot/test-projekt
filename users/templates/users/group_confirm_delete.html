{% extends "base.html" %}

{% block title %}Удаление группы{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3>Вы уверены, что хотите удалить группу "{{ group.name }}"?</h3>
            <p class="text-danger">Это действие нельзя отменить.</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Удалить</button>
                <a href="{% url 'users:group_list' %}" class="btn btn-outline-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
